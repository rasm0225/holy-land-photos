<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HolyLandPhotos · Round 2 — flat preview</title>

    <link rel="icon" type="image/svg+xml" href="../assets/favicon-h.svg" />

    <style>
      html, body { margin: 0; padding: 0; background: #ece9e2; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
      .screen-header {
        position: sticky; top: 0; z-index: 100;
        background: #1c1c1c; color: #fff;
        padding: 12px 24px;
        font-size: 13px; letter-spacing: 0.06em;
        display: flex; gap: 16px; align-items: center; flex-wrap: wrap;
      }
      .screen-header a { color: #d8d6d2; text-decoration: none; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; }
      .screen-header a:hover { color: #fff; }
      .screen-label {
        background: #1c1c1c; color: #fff;
        padding: 14px 24px;
        font-family: -apple-system, system-ui, sans-serif;
        font-size: 12px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }
      .screen-label .meta { color: #888; margin-left: 14px; }
      .screen-stage { background: #fff; position: relative; }
      .screen-stage--mobile {
        background: #ece9e2;
        padding: 40px 0;
        display: flex; justify-content: center;
      }
      .screen-stage--mobile .mobile-clip {
        width: 390px; height: 700px;
        border: 1px solid #d8d6d2;
        background: #fff;
        overflow: hidden;
        position: relative;
      }
      .stage-overlay-host { position: relative; min-height: 800px; }
    </style>

    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel" src="content.jsx"></script>
    <script type="text/babel" src="shared.jsx"></script>
    <script type="text/babel" src="ai-chat.jsx"></script>
    <script type="text/babel" src="plain.jsx"></script>
    <script type="text/babel" src="mobile.jsx"></script>
    <script type="text/babel" src="round2.jsx"></script>

    <script type="text/babel">
      function Screen({ id, title, meta, mobile, fixedHeight, children }) {
        return (
          <div id={id}>
            <div className="screen-label">
              {title}{meta && <span className="meta">{meta}</span>}
            </div>
            <div className={"screen-stage" + (mobile ? " screen-stage--mobile" : "")}>
              {mobile
                ? <div className="mobile-clip">{children}</div>
                : <div className="stage-overlay-host" style={fixedHeight ? { height: fixedHeight } : null}>{children}</div>}
            </div>
          </div>
        );
      }

      function App() {
        return (
          <div>
            <div className="screen-header">
              <strong>HolyLandPhotos · Round 2</strong>
              <a href="#lightbox">Lightbox</a>
              <a href="#dlmodal">Download modal</a>
              <a href="#drawer">Mobile drawer</a>
              <a href="#aisearch">AI search page</a>
              <a href="#nl-idle">Newsletter</a>
              <a href="#nl-success">→ success</a>
              <a href="#nl-error">→ error</a>
              <a href="#print">Print preview</a>
            </div>

            <Screen id="lightbox" title="Lightbox overlay" meta="opened from photo page" fixedHeight={900}>
              <PlainLightboxDemo />
            </Screen>
            <Screen id="dlmodal" title="Download / copyright modal" meta="opened from Download button" fixedHeight={900}>
              <PlainDownloadModalDemo />
            </Screen>
            <Screen id="drawer" title="Mobile hamburger drawer" mobile>
              <MobileDrawerDemo />
            </Screen>
            <Screen id="aisearch" title="AI Search · full page" meta="path: /ai-search">
              <PlainAISearchPage />
            </Screen>
            <Screen id="nl-idle" title="Newsletter · idle" meta="path: /newsletter">
              <PlainNewsletter state="idle" />
            </Screen>
            <Screen id="nl-error" title="Newsletter · error" meta="invalid email submitted">
              <PlainNewsletter state="error" />
            </Screen>
            <Screen id="nl-success" title="Newsletter · success" meta="after submit">
              <PlainNewsletter state="success" />
            </Screen>
            <Screen id="print" title="Print preview · photo page" meta="@media print rendering">
              <PlainPrintPreview />
            </Screen>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
