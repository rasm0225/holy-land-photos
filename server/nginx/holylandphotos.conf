# Main site: serve on apex holylandphotos.org
server {
    listen 443 ssl;
    http2 on;
    server_name holylandphotos.org;

    ssl_certificate /etc/letsencrypt/live/holylandphotos.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/holylandphotos.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Block AI training crawlers and heavy SEO scrapers (see 00-bot-block.conf)
    if ($blocked_ua) { return 403; }
    if ($blocked_country) { return 403; }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    client_max_body_size 50M;
}

# Canonicalise www -> apex (HTTPS)
server {
    listen 443 ssl;
    http2 on;
    server_name www.holylandphotos.org;

    ssl_certificate /etc/letsencrypt/live/holylandphotos.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/holylandphotos.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    if ($blocked_ua) { return 403; }
    if ($blocked_country) { return 403; }

    return 301 https://holylandphotos.org$request_uri;
}

# Redirect plain HTTP to HTTPS for both hostnames
server {
    listen 80;
    server_name holylandphotos.org www.holylandphotos.org;

    if ($blocked_ua) { return 403; }
    if ($blocked_country) { return 403; }

    return 301 https://holylandphotos.org$request_uri;
}
