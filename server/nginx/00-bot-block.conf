# Drop requests from AI training crawlers and heavy SEO scrapers at
# the edge. robots.txt asks them not to crawl; this enforces it for
# bots that ignore the request, AND removes them from analytics
# immediately rather than waiting 24-48h for re-fetch.
#
# Real search engines (Googlebot, bingbot, DuckDuckBot, Applebot,
# YandexBot) are deliberately NOT on this list — the site is
# supposed to be findable in search.
map $http_user_agent $blocked_ua {
    default                 0;
    # AI training / LLM crawlers
    "~*meta-externalagent"  1;
    "~*Meta-ExternalAgent"  1;
    "~*Meta-ExternalFetcher" 1;
    "~*FacebookBot"         1;
    "~*GPTBot"              1;
    "~*ChatGPT-User"        1;
    "~*OAI-SearchBot"       1;
    "~*anthropic-ai"        1;
    "~*ClaudeBot"           1;
    "~*Claude-Web"          1;
    "~*GoogleOther"         1;
    "~*Google-Extended"     1;
    "~*Amazonbot"           1;
    "~*Applebot-Extended"   1;
    "~*PerplexityBot"       1;
    "~*Perplexity-User"     1;
    "~*Bytespider"          1;
    "~*CCBot"               1;
    "~*cohere-ai"           1;
    "~*Diffbot"             1;
    "~*YouBot"              1;
    "~*AI2Bot"              1;
    "~*omgili"              1;
    "~*Timpibot"            1;
    "~*ImagesiftBot"        1;
    # Heavy SEO scrapers
    "~*DataForSeoBot"       1;
    "~*SemrushBot"          1;
    "~*AhrefsBot"           1;
    "~*MJ12bot"             1;
    "~*DotBot"              1;
    "~*rogerbot"            1;
    "~*BLEXBot"             1;
    "~*PetalBot"            1;
    "~*SleepBot"            1;
}
