<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HolyLandPhotos — flat screen preview</title>

    <link rel="icon" type="image/svg+xml" href="../assets/favicon-h.svg" />

    <style>
      html, body { margin: 0; padding: 0; background: #ece9e2; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
      .screen-header {
        position: sticky; top: 0; z-index: 100;
        background: #1c1c1c; color: #fff;
        padding: 12px 24px;
        font-size: 13px; letter-spacing: 0.06em;
        display: flex; gap: 16px; align-items: center;
      }
      .screen-header a { color: #d8d6d2; text-decoration: none; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; }
      .screen-header a:hover { color: #fff; }
      .screen-label {
        background: #1c1c1c; color: #fff;
        padding: 14px 24px;
        font-family: -apple-system, system-ui, sans-serif;
        font-size: 12px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }
      .screen-label .meta { color: #888; margin-left: 14px; }
      .screen-stage { background: #fff; }
      .screen-stage--mobile {
        background: #ece9e2;
        padding: 40px 0;
        display: flex; justify-content: center;
      }
      .screen-stage--mobile .mobile-clip {
        width: 390px;
        border: 1px solid #d8d6d2;
        background: #fff;
        overflow: hidden;
      }
    </style>

    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel" src="content.jsx"></script>
    <script type="text/babel" src="shared.jsx"></script>
    <script type="text/babel" src="ai-chat.jsx"></script>
    <script type="text/babel" src="plain.jsx"></script>
    <script type="text/babel" src="mobile.jsx"></script>

    <script type="text/babel">
      function Screen({ id, title, meta, mobile, children }) {
        return (
          <div id={id}>
            <div className="screen-label">
              {title}{meta && <span className="meta">{meta}</span>}
            </div>
            <div className={"screen-stage" + (mobile ? " screen-stage--mobile" : "")}>
              {mobile ? <div className="mobile-clip">{children}</div> : children}
            </div>
          </div>
        );
      }

      function App() {
        return (
          <div>
            <div className="screen-header">
              <strong>HolyLandPhotos · Hero page preview</strong>
              <a href="#desktop-home">D · Home</a>
              <a href="#desktop-section">D · Section</a>
              <a href="#desktop-photo">D · Photo</a>
              <a href="#desktop-search">D · Search</a>
              <a href="#mobile-home">M · Home</a>
              <a href="#mobile-section">M · Section</a>
              <a href="#mobile-photo">M · Photo</a>
              <a href="#mobile-search">M · Search</a>
              <span style={{marginLeft:"auto",color:"#888",fontSize:11}}>For the canvas view: index.html</span>
            </div>

            <Screen id="desktop-home"    title="Desktop · Homepage"     meta="path: /">
              <PlainHome />
            </Screen>
            <Screen id="desktop-section" title="Desktop · Section page" meta="path: /browse/haran">
              <PlainSection />
            </Screen>
            <Screen id="desktop-photo"   title="Desktop · Photo page"   meta="path: /photos/ICSHMD10">
              <PlainPhoto />
            </Screen>
            <Screen id="desktop-search"  title="Desktop · Search results" meta='query: "haran"'>
              <PlainSearch />
            </Screen>

            <Screen id="mobile-home"     title="Mobile · Homepage (390 px)" mobile>
              <MPlainHome />
            </Screen>
            <Screen id="mobile-section"  title="Mobile · Section page" mobile>
              <MPlainSection />
            </Screen>
            <Screen id="mobile-photo"    title="Mobile · Photo page" mobile>
              <MPlainPhoto />
            </Screen>
            <Screen id="mobile-search"   title="Mobile · Search results" mobile>
              <MPlainSearch />
            </Screen>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
