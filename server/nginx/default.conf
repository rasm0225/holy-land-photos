# Catch-all default server: HTTP requests for unknown hostnames or
# direct-by-IP access. Holylandphotos.org and ggf.everyphere.com have
# their own server blocks; anything else lands here.
server {
    listen 80 default_server;
    server_name _;

    # Same bot/geo blocks as the named vhosts. Without these, direct-by-IP
    # HTTP requests skip every blocklist and reach the app unfiltered
    # (this was how Singapore scraper traffic reappeared in July 2026).
    if ($blocked_ua) { return 403; }
    if ($blocked_country) { return 403; }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    client_max_body_size 50M;
}
